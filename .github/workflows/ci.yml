name: Continuous Integration

on:
  pull_request:
    branches: [master]
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Enforce Conventional Commit PR Title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js Environment
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Programmatic Assets
        run: npm run generate-assets

      - name: Execute Lint Verification
        run: npm run lint

      - name: Execute Format Verification
        run: npm run format:check

      - name: Execute Type Verification
        run: npm run typecheck

      - name: Compile Production Artifacts
        run: npm run build

      - name: Execute Lighthouse Performance Budget
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'
