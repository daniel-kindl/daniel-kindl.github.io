name: Continuous Integration

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js Environment
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Programmatic Assets
        run: npm run generate-assets

      - name: Execute Lint Verification
        run: npm run lint

      - name: Execute Format Verification
        run: npm run format:check

      - name: Execute Type Verification
        run: npx astro check

      - name: Compile Production Artifacts
        run: npm run build
