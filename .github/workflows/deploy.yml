name: Production Deployment

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js Environment
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Determine Version Bump
        id: version
        env:
          SUBJECT: ${{ github.event.head_commit.message }}
        run: |
          BUMP=""
          if echo "$SUBJECT" | grep -qE '^chore: bump version to '; then
            echo "This is a version bump commit, skipping."
          elif echo "$SUBJECT" | grep -qE '^[a-z]+(\([^)]+\))?!:'; then
            BUMP="major"
          elif echo "$SUBJECT" | grep -qE '^feat(\([^)]+\))?:'; then
            BUMP="minor"
          elif echo "$SUBJECT" | grep -qE '^(fix|perf)(\([^)]+\))?:'; then
            BUMP="patch"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Apply Version Bump Locally
        if: steps.version.outputs.bump != ''
        run: npm version "${{ steps.version.outputs.bump }}" --no-git-tag-version

      - name: Generate Programmatic Assets
        run: npm run generate-assets

      - name: Compile Production Artifacts
        run: npm run build

      - name: Execute Lighthouse Performance Budget
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4 # v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'

      - name: Setup Pages Architecture
        uses: actions/configure-pages@v6

      - name: Upload Static Package
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

      - name: Deploy to GitHub Pages Target
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Commit Version Bump
        if: steps.version.outputs.bump != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $(node -p "require('./package.json').version") [skip ci]"
          git push
